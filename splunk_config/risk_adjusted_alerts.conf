# Hayyan SOC Lab — Risk-Adjusted Splunk Detections
# =================================================
# Apply to Splunk: Settings → Searches, Reports, and Alerts
# Or copy inside container:
#   docker exec hayyan-splunk bash -c "cat >> /opt/splunk/etc/system/local/savedsearches.conf"
#
# These detections combine THREE signals:
#   1. Live activity (telemetry indexes)
#   2. Threat intelligence (misp_iocs / misp_ioc_lookup.csv)
#   3. Vulnerability posture (vuln_scans)
#
# A finding that hits all three is a true Crown Jewel Alert.
# ─────────────────────────────────────────────────────────────────────────────

# ── Detection 1: MISP IOC — Known-Bad IP in Web Logs ─────────────────────────
[MISP IOC - Known-Bad IP in Nginx Web Logs]
search = index=linux_web \
    [| inputlookup misp_ioc_lookup.csv \
     | where ioc_type="ip-dst" OR ioc_type="ip-src" \
     | rename ioc_value as clientip \
     | fields clientip] \
| stats count, values(request) as paths, values(status) as statuses by clientip \
| eval threat_context="MISP: Known malicious IP touching web server" \
| eval severity="high"
cron_schedule = */5 * * * *
dispatch.earliest_time = -6m
dispatch.latest_time = now
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 30m
alert.suppress.fields = clientip
counttype = number of events
quantity = 0
relation = greater than
alert.track = 1
alert.expires = 24h
description = Known-bad MISP IOC IP address detected in Nginx web logs. \
    Cross-reference with vuln_scans to assess risk uplift.

# ── Detection 2: MISP IOC — Domain in Sysmon DNS Events ──────────────────────
[MISP IOC - C2 Domain in Sysmon DNS]
search = index=sysmon EventCode=22 \
    [| inputlookup misp_ioc_lookup.csv \
     | where ioc_type="domain" OR ioc_type="hostname" \
     | rename ioc_value as QueryName \
     | fields QueryName] \
| rex field=_raw "Name='Image'>(?<process>[^<]+)" \
| rex field=_raw "Name='QueryName'>(?<query_name>[^<]+)" \
| stats count, values(process) as processes, values(query_name) as domains by Computer \
| eval threat_context="MISP: Known C2 domain queried by host" \
| eval severity="critical"
cron_schedule = */5 * * * *
dispatch.earliest_time = -6m
dispatch.latest_time = now
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 1h
alert.suppress.fields = Computer
counttype = number of events
quantity = 0
relation = greater than
alert.track = 1
alert.expires = 48h
description = A domain flagged as C2 infrastructure in MISP was queried by an endpoint. \
    This is a high-confidence indicator of compromise.

# ── Detection 3: MISP IOC — Hash Seen in Sysmon Process ──────────────────────
[MISP IOC - Known-Bad Hash in Sysmon Process Creation]
search = index=sysmon EventCode=1 \
    [| inputlookup misp_ioc_lookup.csv \
     | where ioc_type="md5" OR ioc_type="sha256" \
     | rename ioc_value as Hashes \
     | fields Hashes] \
| rex field=_raw "Name='Image'>(?<process>[^<]+)" \
| rex field=_raw "Name='CommandLine'>(?<cmdline>[^<]+)" \
| rex field=_raw "Name='Hashes'>(?<hashes>[^<]+)" \
| stats count, values(process) as processes, values(cmdline) as cmdlines by Computer, hashes \
| eval threat_context="MISP: Known malware hash executed on endpoint" \
| eval severity="critical"
cron_schedule = */5 * * * *
dispatch.earliest_time = -6m
dispatch.latest_time = now
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 2h
counttype = number of events
quantity = 0
relation = greater than
alert.track = 1
description = A known-malicious file hash (from MISP) was executed on a DC01 endpoint.

# ── Detection 4: Risk-Adjusted — Brute Force + Open Critical CVE ─────────────
[RISK-ADJUSTED - Password Spray on Host with Critical CVE]
search = index=windows_events EventCode=4625 \
| stats count by IpAddress, TargetUserName \
| where count > 5 \
| join type=left IpAddress \
    [search index=vuln_scans severity=critical \
     | stats max(cvssscore) as max_cvss, values(cveid) as open_cves by target \
     | rename target as IpAddress] \
| eval risk_score = count * (if(isnotnull(max_cvss), max_cvss, 1)) \
| eval alert_level = case( \
    isnotnull(max_cvss) AND max_cvss >= 9.0, "CRITICAL_UPLIFT", \
    isnotnull(max_cvss) AND max_cvss >= 7.0, "HIGH_UPLIFT", \
    1=1, "STANDARD") \
| where alert_level != "STANDARD" OR count > 20 \
| eval threat_context = "Brute force on host with open CVEs: " + tostring(open_cves)
cron_schedule = */5 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time = now
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 30m
alert.suppress.fields = IpAddress
counttype = number of events
quantity = 0
relation = greater than
alert.track = 1
description = Password spray or brute force attack on a host with KNOWN unpatched critical CVEs. \
    Risk is significantly elevated — this is likely targeted exploitation. \
    AI agent should call get_vuln_posture on the target IP before assessing.

# ── Detection 5: Risk-Adjusted — Web Scanner from Non-Authorized Source ───────
[RISK-ADJUSTED - Scanner Detected from Non-Authorized Host]
search = index=linux_web \
| stats count by clientip \
| where count > 15 \
| where clientip != "192.168.56.20" \
| eval scanner_authorized = "NO - NOT the authorized scanner (192.168.56.20)" \
| eval threat_context = "Web scanning from UNAUTHORIZED source: " + clientip \
| eval severity = "high"
cron_schedule = */5 * * * *
dispatch.earliest_time = -6m
dispatch.latest_time = now
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 15m
alert.suppress.fields = clientip
counttype = number of events
quantity = 0
relation = greater than
alert.track = 1
description = Web scanning detected from a source that is NOT the authorized scanner (Rocky Linux 192.168.56.20). \
    This is a rogue or unauthorized scan. Authorized scans only originate from 192.168.56.20.

# ── Detection 6: Crown Jewel — IOC + Active Attack + Open Critical CVE ────────
[CROWN JEWEL - IOC Match + Active Scanning + Critical Vulnerability]
search = index=linux_web \
    [| inputlookup misp_ioc_lookup.csv \
     | where ioc_type="ip-dst" OR ioc_type="ip-src" \
     | rename ioc_value as clientip \
     | fields clientip] \
| stats count by clientip \
| join type=inner clientip \
    [search index=vuln_scans severity=critical earliest=-30d \
     | rename target as clientip \
     | stats count as vuln_count, max(cvssscore) as max_cvss by clientip] \
| eval threat_context = "TRIPLE SIGNAL: Known-bad IP + Scanning + Open critical CVE (CVSS=" + tostring(max_cvss) + ")" \
| eval alert_level = "CRITICAL"
cron_schedule = */10 * * * *
dispatch.earliest_time = -11m
dispatch.latest_time = now
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 4h
counttype = number of events
quantity = 0
relation = greater than
alert.track = 1
description = CROWN JEWEL ALERT: A MISP-flagged malicious IP is actively scanning a host \
    that has an unpatched critical vulnerability. This warrants immediate escalation.

# ── Retrospective Hunt: New MISP IOCs vs Historical Logs ──────────────────────
[HUNT - New MISP IOCs Against Historical Linux Web Logs]
search = index=linux_web earliest=-7d \
    [| inputlookup misp_ioc_lookup.csv \
     | where ioc_type="ip-dst" OR ioc_type="ip-src" \
     | where sync_time > relative_time(now(), "-24h") \
     | rename ioc_value as clientip \
     | fields clientip] \
| stats count, min(_time) as first_seen, max(_time) as last_seen, values(request) as requests by clientip \
| eval context = "RETROSPECTIVE HUNT: IOC was in our logs before it was added to MISP" \
| sort -count
cron_schedule = 0 6 * * *
dispatch.earliest_time = -7d
dispatch.latest_time = now
alert.severity = 3
alert.suppress = 0
counttype = number of events
quantity = 0
relation = greater than
alert.track = 1
description = Daily retrospective hunt: checks if newly added MISP IOCs appeared in \
    historical logs BEFORE we knew they were malicious. This surfaces late-discovered compromises.
