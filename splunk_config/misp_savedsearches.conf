# Hayyan SOC Lab — MISP IOC Correlation Alerts
# Apply via: Splunk UI → Settings → Searches, Reports, and Alerts
# Or copy into: $SPLUNK_HOME/etc/apps/search/local/savedsearches.conf
#
# These three searches form the MISP feedback loop:
#   known-bad IOC appears in live traffic → alert fires → AI agent investigates
#   with MISP context already attached.

# ── Alert 1: Known-Bad IP hits the web server ─────────────────────────────────
[MISP IOC - Known IP in Web Traffic]
search = index=linux_web \
    [| inputlookup misp_ioc_lookup.csv \
     | where ioc_type="ip-dst" OR ioc_type="ip-src" \
     | rename ioc_value as clientip \
     | dedup clientip] \
| stats count, values(status) as statuses, values(request) as requests \
  by clientip, _time \
| where count > 0
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 4
alert.track = 1
alert.suppress = 1
alert.suppress.period = 5m
alert.suppress.fields = clientip
description = A source IP from MISP threat intel database was seen making requests to the Nginx web server. Near-zero false positive rate.

# ── Alert 2: Known Malware Hash seen in Sysmon process creation ───────────────
[MISP IOC - Malware Hash Executed on DC01]
search = index=sysmon EventCode=1 \
  [| inputlookup misp_ioc_lookup.csv \
   | where ioc_type="md5" OR ioc_type="sha256" \
   | rename ioc_value as Hashes \
     | dedup Hashes] \
| table _time, host, Image, CommandLine, ParentImage, User, Hashes
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 5
alert.track = 1
alert.suppress = 0
description = A file hash matching a known malware sample in MISP was executed on DC01. Treat as confirmed compromise until proven otherwise.

# ── Alert 3: DNS query to known C2 domain ────────────────────────────────────
[MISP IOC - DNS Query to Known C2]
search = index=sysmon EventCode=22 \
  [| inputlookup misp_ioc_lookup.csv \
   | where ioc_type="domain" OR ioc_type="hostname" \
   | rename ioc_value as QueryName \
     | dedup QueryName] \
| table _time, host, Image, QueryName, QueryResults
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 5
alert.track = 1
alert.suppress = 1
alert.suppress.period = 15m
alert.suppress.fields = QueryName
description = A DNS query was made to a domain listed as C2 infrastructure in MISP. Likely malware callback — investigate the process making the request.

# ── Alert 4: Exposed + Attacked (crown-jewel detection) ─────────────────────
[Exposed and Actively Attacked Host]
search = index=vuln_scans severity="critical" OR severity="high" \
| stats values(cveid) as open_cves, max(cvssscore) as max_cvss by target \
| join target \
    [search (index=linux_web OR index=windows_events) earliest=-24h \
     | rename clientip as target, IpAddress as target \
     | stats count as attack_events by target] \
| where attack_events > 10 \
| sort -max_cvss \
| table target, max_cvss, open_cves, attack_events
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = 0 * * * *
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 5
alert.track = 1
alert.suppress = 1
alert.suppress.period = 1h
alert.suppress.fields = target
description = A host has both open high/critical CVEs AND is receiving significant attack traffic in the last 24h. This is a crown-jewel risk — patch window required immediately.
