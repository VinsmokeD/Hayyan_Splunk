# Hayyan SOC Lab — New Splunk Indexes for Task 2
# Apply via: Splunk UI → Settings → Indexes → New Index
# Or copy to: $SPLUNK_HOME/etc/system/local/indexes.conf inside the container
#
# docker exec hayyan-splunk bash -c "cat >> /opt/splunk/etc/system/local/indexes.conf" < splunk_config/indexes.conf
# docker exec hayyan-splunk /opt/splunk/bin/splunk restart

[vuln_scans]
homePath   = $SPLUNK_DB/vuln_scans/db
coldPath   = $SPLUNK_DB/vuln_scans/colddb
thawedPath = $SPLUNK_DB/vuln_scans/thaweddb
# Keep 90 days of scan data — enough for trending without eating disk
frozenTimePeriodInSecs = 7776000
maxTotalDataSizeMB = 1024

[misp_iocs]
homePath   = $SPLUNK_DB/misp_iocs/db
coldPath   = $SPLUNK_DB/misp_iocs/colddb
thawedPath = $SPLUNK_DB/misp_iocs/thaweddb
# Keep 30 days — misp42splunk TA refreshes this regularly
frozenTimePeriodInSecs = 2592000
maxTotalDataSizeMB = 512

[ai_soc_audit]
homePath   = $SPLUNK_DB/ai_soc_audit/db
coldPath   = $SPLUNK_DB/ai_soc_audit/colddb
thawedPath = $SPLUNK_DB/ai_soc_audit/thaweddb
# Audit trail — keep 1 year
frozenTimePeriodInSecs = 31536000
maxTotalDataSizeMB = 256
