# MISP Threat Intelligence Platform — Hayyan SOC Lab
# Deploy: docker compose -f docker-compose.misp.yml up -d
# UI:     https://127.0.0.1:8443  (admin@admin.test / MispAdmin2026!)
# API:    https://127.0.0.1:8443  (Administration → Auth Keys)
#
# Fix: Switched from coolacid/misp-docker (broken supervisord env) to
#      ghcr.io/misp/misp-docker (officially maintained, stable on Docker Desktop)

services:

  misp:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    container_name: hayyan-misp
    restart: unless-stopped
    ports:
      - "8443:443"
      - "8081:80"
    environment:
      - MISP_BASEURL=https://127.0.0.1:8443
      - MISP_ADMIN_EMAIL=admin@admin.test
      - MISP_ADMIN_PASSPHRASE=MispAdmin2026!
      - MISP_ORG=Hayyan-Horizons
      - MISP_SALT=HayyanSOCLabSalt2024x32chars!!
      - MYSQL_HOST=misp-db
      - MYSQL_PORT=3306
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misp_db_pass_2024
      - MYSQL_DATABASE=misp
      - REDIS_FQDN=misp-redis
      - CRON_USER_ID=1
      - WORKERS=1
    volumes:
      - misp-data:/var/www/MISP/app/files
      - misp-logs:/var/www/MISP/app/tmp/logs
    depends_on:
      misp-db:
        condition: service_healthy
      misp-redis:
        condition: service_started
    networks:
      - misp-net

  misp-db:
    image: mysql:8.0
    container_name: hayyan-misp-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=misp_root_pass_2024
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misp_db_pass_2024
    volumes:
      - misp-db-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_allowed_packet=500M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pmisp_root_pass_2024"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - misp-net

  misp-redis:
    image: redis:7-alpine
    container_name: hayyan-misp-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass redispassword
    volumes:
      - misp-redis-data:/data
    networks:
      misp-net:
        aliases:
          - redis

volumes:
  misp-data:
  misp-logs:
  misp-db-data:
  misp-redis-data:

networks:
  misp-net:
    driver: bridge
