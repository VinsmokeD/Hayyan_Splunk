# Hayyan SOC Lab — Scan Targets Configuration
# Used by orchestrator.sh to control what gets scanned and how

hosts:
  - id: rocky_web
    ip: "192.168.56.20"
    label: "Rocky Linux Web Server"
    scan_types: [nuclei_web, trivy_fs]

  - id: dc01
    ip: "192.168.56.10"
    label: "DC01 — Windows Server 2022"
    scan_types: [nuclei_dc01]

  - id: splunk_host
    ip: "192.168.56.1"
    label: "Host — Splunk + MISP Docker"
    scan_types: [nuclei_web, trivy_containers]

nuclei:
  # Severities to include — "info" is too noisy for a lab
  severity: "medium,high,critical"
  # Rate limit (requests/sec) — keep it low so Splunk web scanner alert doesn't fire
  rate_limit: 25
  # Templates directory (downloaded by nuclei -update-templates)
  templates: "~/.local/nuclei-templates"
  # Exclude noisy or irrelevant template categories
  exclude_tags: "dos,fuzz,helpers"
  # Timeout per request
  timeout: 5

trivy:
  severity: "HIGH,CRITICAL"
  # Don't fail on unfixed CVEs (just report them)
  ignore_unfixed: false
  # Skip the .venv directory in filesystem scans
  skip_dirs: [".venv", "node_modules", ".git"]

splunk_hec:
  # Loaded from splunk_hec.env — do not hard-code here
  index: "vuln_scans"
  sourcetype: "hayyan:vuln:scan"

misp:
  # Min CVSS score to auto-create MISP events
  min_cvss_for_event: 7.0
  # TLP for auto-created events
  tlp: "amber"
  org: "Hayyan-Horizons"
